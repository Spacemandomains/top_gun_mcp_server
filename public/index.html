<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="alternate" type="application/json" title="AI Agent Discovery" href="/ai-agents.json">
    <link rel="service" type="application/json" title="OpenAPI Spec" href="/openapi.json">

<body class="bg-slate-950 text-slate-100 font-mono">
    <main class="max-w-4xl mx-auto py-24 px-6 text-center">

        <div class="bg-slate-900 border border-slate-800 p-10 rounded-lg inline-block">

        <footer class="mt-20 text-[10px] text-slate-600">
            &copy; 2026 Wilfred L. Lee Jr. | top-gun-mcp-server.vercel.app

    </main>
    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session_id');

    if (sessionId) {
        const successDiv = document.createElement('div');
        successDiv.className = "bg-green-600/20 border border-green-500 p-6 mt-8 rounded text-left";
        successDiv.innerHTML = `
            <h3 class="text-green-500 font-bold mb-2 uppercase text-xs tracking-widest">Payment Verified</h3>
            <p class="text-sm text-slate-300 mb-4">Copy your Session ID below and provide it to the AI Agent:</p>
            <code class="bg-black p-3 block text-green-400 break-all border border-green-900/50">${sessionId}</code>
        `;
        document.querySelector('main').appendChild(successDiv);
    }
    </script>
</body>
</html>
